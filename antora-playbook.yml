# Dev Center docs — CI/production (dev-centr repos only)
# Standard name: antora-playbook.yml. Local overrides: antora-playbook-local.yml (copy from antora-playbook-local.example.yml).
site:
  title: Dev-Centr Docs
  url: https://docs.devcentr.org
  start_page: home::index.adoc
content:
  sources:
    - url: https://github.com/dev-centr/docs.git
      branches: HEAD
      start_path: docs
    - url: https://github.com/dev-centr/devcentr.git
      branches: HEAD
      start_path: docs
    - url: https://github.com/dev-centr/templates.git
      branches: HEAD
      start_path: docs
    - url: https://github.com/dev-centr/msi-installer-generator.git
      branches: HEAD
      start_path: docs
ui:
  bundle:
    url: https://github.com/antora-supplemental/antora-dark-theme/releases/latest/download/ui-bundle.zip
    snapshot: true
  supplemental_files: ./supplemental-ui
output:
  dir: ./build/site
